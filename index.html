<style>
:root {
  --bg: #f7f1e8;
  --panel: #fffdf8;
  --text: #2d2924;
  --muted: #73685e;
  --line: #e3d4c2;
  --accent: #2f6656;
  --accent-soft: #e8f1ec;
  --warn: #8b5a35;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  background: var(--bg);
  color: var(--text);
}
header {
  padding: 34px 18px 30px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, #f5ecdf, #f8f3eb);
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(34px, 4vw, 52px);
  line-height: 1.02;
}
.subtitle {
  margin: 0;
  color: var(--muted);
  font-size: 18px;
}
.controls {
  display: grid;
  grid-template-columns: minmax(260px, 2fr) repeat(4, minmax(170px, 1fr));
  gap: 14px;
  padding: 22px 18px;
  border-bottom: 1px solid var(--line);
}
input, select {
  width: 100%;
  padding: 14px 15px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  font-size: 16px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(220px, 1fr));
  gap: 18px;
  padding: 26px 18px 10px;
}
.stat {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 24px 20px;
}
.num {
  font-size: 38px;
  font-weight: 700;
  color: var(--warn);
  line-height: 1;
}
.label {
  font-size: 16px;
  color: var(--muted);
}
.meta {
  padding: 16px 18px 8px;
  color: var(--muted);
  font-size: 18px;
}
.cards {
  display: grid;
  grid-template-columns: repeat(4, minmax(240px, 1fr));
  gap: 20px;
  padding: 14px 18px 40px;
}
.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 24px 22px;
  box-shadow: 0 2px 12px rgba(63, 45, 28, 0.04);
}
.card h2 {
  margin: 0 0 14px;
  font-size: 23px;
  line-height: 1.08;
}
.source {
  color: var(--accent);
  font-weight: 700;
  font-size: 20px;
  margin-bottom: 14px;
}
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 12px 0 14px;
}
.tag {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 10px;
  background: #fff;
  color: #65594d;
  font-size: 14px;
}
.tag.deadline-closing { background: var(--accent-soft); color: var(--accent); border-color: #c7ddcf; }
.tag.deadline-archive { background: #f3e5db; color: #86533d; }
.idline {
  color: var(--muted);
  font-size: 14px;
  margin: 10px 0;
}
.summary {
  border-top: 1px solid var(--line);
  margin-top: 14px;
  padding-top: 14px;
  color: #4a433b;
  line-height: 1.35;
  max-height: 120px;
  overflow: auto;
}
.card a {
  display: inline-block;
  margin-top: 14px;
  color: var(--accent);
  font-weight: 700;
  text-decoration: none;
}
.empty {
  padding: 40px 18px;
  color: var(--muted);
  font-size: 20px;
}
@media (max-width: 1200px) {
  .cards { grid-template-columns: repeat(3, minmax(240px, 1fr)); }
  .controls { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 760px) {
  .cards { grid-template-columns: 1fr; }
  .controls { grid-template-columns: 1fr; }
  .stats { grid-template-columns: 1fr; }
}
</style>
</head>

const IS_PRIVATE = false;

function text(value) {
  if (value === null || value === undefined) return "";
  return String(value);
}

function htmlEscape(value) {
  return text(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function first(row, keys) {
  for (let i = 0; i < keys.length; i++) {
    const value = row[keys[i]];
    if (value !== null && value !== undefined && String(value).trim() !== "") {
      return String(value).trim();
    }
  }
  return "";
}

function normalizeType(row) {
  let raw = first(row, ["type", "category", "opportunity_type", "opportunity_category"]);
  raw = raw.replace("Consultations & participation", "Consultations & participation");
  raw = raw.replace("Consultations &amp; participation", "Consultations & participation");
  if (raw === "") return "Other opportunities";
  return raw;
}

function normalizeAudience(row) {
  const raw = first(row, ["audience", "target_audience", "eligible_applicants", "who_can_apply"]);
  if (raw === "") return "Open / mixed";
  return raw;
}

function normalizeDeadline(row) {
  const raw = first(row, ["deadline_group", "deadline_status", "deadline_category", "deadline"]);
  const lower = raw.toLowerCase();
  if (lower.includes("expired") || lower.includes("archive")) return "Archive";
  if (lower.includes("closing soon")) return "Closing soon";
  if (lower.includes("rolling")) return "Rolling / open";
  if (lower.includes("no clear") || lower.includes("no date")) return "No date listed";
  if (lower.includes("open") || lower.includes("mixed")) return "Open / mixed";
  return "Open / mixed";
}

function normalizeLocation(row) {
  const raw = first(row, ["region", "region_group", "location", "geography", "geographic_scope", "country"]);
  const lower = raw.toLowerCase();

  function hasAny(terms) {
    return terms.some(function(term) { return lower.includes(term); });
  }

  if (lower.trim() === "") return "";
  if (hasAny(["remote", "hybrid", "online"])) return "";

  if (hasAny(["global", "worldwide", "international", "any country"])) return "Global";

  if (hasAny([
    "multiple regions",
    "multi-region",
    "multi regional",
    "cross-regional",
    "cross regional",
    "several regions",
    "Asia",
    "Asia",
    "mena",
    "Africa",
    "Africa"
  ])) return "Multiple regions";

  if (hasAny([
    "africa",

  if (hasAny([

    "caribbean",
    "united states",

  ])) return "Americas";

  if (hasAny([
    "asia",

    "middle east",
    "gulf",
    "arab",
    "jordan",
    "lebanon",
    "iraq",
    "iran",

  ])) return "Asia";

  if (hasAny([
    "europe",
    "european",
    "eu ",
    "eu-",
    "e.u.",
    "united kingdom",

    "england",

  ])) return "Oceania";

  return "";
}

function rowTitle(row) {
  return first(row, ["title", "translated_title_en", "original_title", "name"]);
}

function rowSource(row) {
  return first(row, ["source", "source_name", "provider", "organization", "organisation"]);
}

function rowSummary(row) {
  return first(row, ["summary", "short_summary", "description", "original_excerpt"]);
}

function rowUrl(row) {
  return first(row, ["url", "final_url", "source_url", "opportunity_url", "application_url", "link"]);
}

function rowId(row) {
  return first(row, ["id", "candidate_id", "opportunity_id", "record_id"]);
}

function fillSelect(id, label, values) {
  const select = document.getElementById(id);
  select.innerHTML = "";
  const all = document.createElement("option");
  all.value = "";
  all.textContent = label;
  select.appendChild(all);

  values.forEach(function(value) {
    if (!value) return;
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
}

function uniqueSorted(values) {
  const clean = values.filter(function(v) { return v && String(v).trim() !== ""; });
  return Array.from(new Set(clean)).sort(function(a, b) { return a.localeCompare(b); });
}

function setupFilters() {
  fillSelect("typeFilter", "All types", uniqueSorted(DATA.map(normalizeType)));
  fillSelect("audienceFilter", "All audiences", uniqueSorted(DATA.map(normalizeAudience)));
}

function isArchive(row) {
  return normalizeDeadline(row) === "Archive";
}

function getFilteredRows() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const type = document.getElementById("typeFilter").value;
  const audience = document.getElementById("audienceFilter").value;
  const location = document.getElementById("locationFilter").value;
  const deadline = document.getElementById("deadlineFilter").value;

  return DATA.filter(function(row) {
    const deadlineValue = normalizeDeadline(row);

    if (deadline === "") {
      if (deadlineValue === "Archive") return false;
    } else if (deadline !== deadlineValue) {
      return false;
    }

    if (type && normalizeType(row) !== type) return false;
    if (audience && normalizeAudience(row) !== audience) return false;
    if (location && normalizeLocation(row) !== location) return false;

    if (q) {
      const haystack = [
        rowTitle(row),
        rowSource(row),
        normalizeType(row),
        normalizeAudience(row),
        normalizeLocation(row),
        normalizeDeadline(row),
        rowSummary(row)
      ].join(" ").toLowerCase();
      if (!haystack.includes(q)) return false;
    }

    return true;
  });
}

function renderCard(row) {
  const title = htmlEscape(rowTitle(row));
  const source = htmlEscape(rowSource(row));
  const type = htmlEscape(normalizeType(row));
  const audience = htmlEscape(normalizeAudience(row));
  const location = htmlEscape(normalizeLocation(row));
  const deadline = htmlEscape(normalizeDeadline(row));
  const summary = htmlEscape(rowSummary(row));
  const url = htmlEscape(rowUrl(row));
  const id = htmlEscape(rowId(row));
  const deadlineClass = normalizeDeadline(row) === "Closing soon" ? " deadline-closing" : normalizeDeadline(row) === "Archive" ? " deadline-archive" : "";

  let link = "";
  if (url) {
    link = '<a href="' + url + '" target="_blank" rel="noopener noreferrer">Open source</a>';
  }

  let locationTag = "";
  if (location) {
    locationTag = '<span class="tag">' + location + '</span>';
  }

  return '<article class="card">' +
    '<h2>' + title + '</h2>' +
    '<div class="source">' + source + '</div>' +
    '<div class="tags">' +
      '<span class="tag">' + type + '</span>' +
      '<span class="tag">' + audience + '</span>' +
      locationTag +
      '<span class="tag' + deadlineClass + '">' + deadline + '</span>' +
    '</div>' +
    '<div class="idline">ID: ' + id + '</div>' +
    '<div class="summary">' + summary + '</div>' +
    link +
  '</article>';
}

function render() {
  const openRows = DATA.filter(function(row) { return !isArchive(row); });
  const closingRows = DATA.filter(function(row) { return normalizeDeadline(row) === "Closing soon"; });
  const rows = getFilteredRows();

  document.getElementById("openCount").textContent = openRows.length;
  document.getElementById("closingSoonCount").textContent = closingRows.length;

  const deadline = document.getElementById("deadlineFilter").value;
  const scopeText = deadline === "Archive" ? "archived opportunities" : "current opportunities";
    const searchActive = document.getElementById("search").value.trim() !== "";
  const typeActive = document.getElementById("typeFilter").value !== "";
  const audienceActive = document.getElementById("audienceFilter").value !== "";
  const locationActive = document.getElementById("locationFilter").value !== "";
  const hasActiveFilter = searchActive || typeActive || audienceActive || locationActive || deadline !== "";
  let metaText = "";
  if (deadline === "Archive") {
    metaText = "Showing " + rows.length + " archived opportunities.";
  } else if (hasActiveFilter) {
    metaText = "Showing " + rows.length + " matching opportunities.";
  } else {
    metaText = "Showing " + rows.length + " current opportunities.";
  }
  document.getElementById("resultMeta").textContent = metaText;

  const cards = document.getElementById("cards");
  if (rows.length === 0) {
    cards.innerHTML = '<div class="empty">No opportunities match these filters.</div>';
    return;
  }

  cards.innerHTML = rows.map(renderCard).join("");
}

setupFilters();
document.getElementById("locationFilter").value = "";
document.getElementById("deadlineFilter").value = "";
["search", "typeFilter", "audienceFilter", "locationFilter", "deadlineFilter"].forEach(function(id) {
  document.getElementById(id).addEventListener("input", render);
  document.getElementById(id).addEventListener("change", render);
});
render();
</script>
